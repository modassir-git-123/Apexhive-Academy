<!DOCTYPE html>
<html><head><title>Dashboard</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-5">
    <div class="card shadow">
        <div class="card-header bg-primary text-white">
            <h3><i class="fas fa-tachometer-alt me-2"></i>Student Dashboard</h3>
        </div>
        <div class="card-body">
            <h4>Welcome, {{ email }}!</h4>
            {% if session.reg_data %}
            <div class="alert alert-success">
                <strong>Class:</strong> {{ session.reg_data.class }} | 
                <strong>Phone:</strong> {{ session.reg_data.phone }}
            </div>
            {% endif %}
            <a href="/courses" class="btn btn-primary">Choose Courses</a>
            <a href="/logout" class="btn btn-danger">Logout</a>
        </div>
    </div>
</div>
</body>
</html>
